<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cours Judo / Jujitsu — Fabrice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;600&family=IBM+Plex+Mono:wght@400;600&display=swap');
  :root {
    --noir:#0d0d0d; --blanc:#f2f0eb; --rouge:#c0392b; --rouge2:#e74c3c;
    --gris1:#1a1a1a; --gris2:#2a2a2a; --gris3:#3d3d3d; --gris4:#888;
    --or:#d4a843; --vert:#27ae60; --bleu:#2980b9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--noir);color:var(--blanc);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}

  /* HEADER */
  header{background:var(--gris1);border-bottom:3px solid var(--rouge);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px;}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;}
  header h1 span{color:var(--rouge);}
  .header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .sync-status{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--gris4);letter-spacing:1px;}
  .sync-status.ok{color:var(--vert);}
  .sync-status.err{color:var(--rouge2);}
  .sync-status.loading{color:var(--or);}
  .nav-btn{background:var(--gris2);color:var(--gris4);border:1px solid var(--gris3);padding:7px 14px;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
  .nav-btn:hover,.nav-btn.active{background:var(--rouge);color:var(--blanc);border-color:var(--rouge);}
  .nav-btn.or{color:var(--or);border-color:var(--or);}
  .nav-btn.or:hover{background:var(--or);color:var(--noir);}

  /* LAYOUT */
  main{display:flex;min-height:calc(100vh - 65px);}
  aside{width:260px;min-width:260px;background:var(--gris1);border-right:1px solid var(--gris3);padding:16px 14px;display:flex;flex-direction:column;gap:10px;}
  .sidebar-title{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;color:var(--gris4);}
  .cours-list{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1;}
  .cours-item{background:var(--gris2);border:1px solid var(--gris3);border-left:3px solid var(--gris3);padding:10px 12px;cursor:pointer;transition:all 0.15s;}
  .cours-item:hover,.cours-item.active{border-left-color:var(--rouge);background:var(--gris3);}
  .ci-titre{font-weight:600;font-size:0.88rem;}
  .ci-meta{font-size:0.7rem;color:var(--gris4);margin-top:3px;font-family:'IBM Plex Mono',monospace;}
  .btn-nouveau{background:var(--rouge);color:var(--blanc);border:none;padding:11px;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;cursor:pointer;width:100%;transition:background 0.2s;}
  .btn-nouveau:hover{background:var(--rouge2);}
  .content{flex:1;padding:24px 32px;overflow-y:auto;}

  /* FORM */
  .form-cours{display:flex;flex-direction:column;gap:20px;max-width:860px;}
  .section-bloc{background:var(--gris1);border:1px solid var(--gris3);border-top:3px solid var(--rouge);padding:18px 22px;}
  .section-bloc h2{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--or);margin-bottom:14px;}
  .field-row{display:flex;gap:14px;flex-wrap:wrap;}
  .field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:160px;}
  .field label{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris4);font-family:'IBM Plex Mono',monospace;}
  .field input,.field select,.field textarea{background:var(--gris2);border:1px solid var(--gris3);color:var(--blanc);padding:9px 11px;font-family:'IBM Plex Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;resize:vertical;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--rouge);}
  .field select option{background:var(--gris2);}

  /* RESSOURCES */
  .ressource-line{display:flex;gap:8px;align-items:center;margin-bottom:7px;flex-wrap:wrap;}
  .ressource-line input{flex:1;min-width:180px;background:var(--gris2);border:1px solid var(--gris3);color:var(--blanc);padding:7px 10px;font-size:0.83rem;outline:none;font-family:'IBM Plex Sans',sans-serif;}
  .ressource-line input:focus{border-color:var(--bleu);}
  .type-badge{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;padding:4px 9px;letter-spacing:1px;white-space:nowrap;}
  .type-yt{background:#c0392b22;color:#e74c3c;border:1px solid #c0392b55;}
  .type-fb{background:#1877f222;color:#74a9f5;border:1px solid #1877f255;}
  .type-vid{background:#27ae6022;color:#2ecc71;border:1px solid #27ae6055;}
  .type-pdf{background:#d4a84322;color:#f1c40f;border:1px solid #d4a84355;}
  .btn-add-res{background:none;border:1px dashed var(--gris3);color:var(--gris4);padding:6px 14px;cursor:pointer;font-size:0.75rem;transition:all 0.2s;font-family:'IBM Plex Mono',monospace;}
  .btn-add-res:hover{border-color:var(--bleu);color:var(--bleu);}
  .btn-del{background:none;border:none;color:var(--gris4);cursor:pointer;font-size:0.95rem;padding:3px 7px;transition:color 0.2s;}
  .btn-del:hover{color:var(--rouge2);}

  /* SÉQUENCE */
  .seq-item{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px;}
  .seq-num{background:var(--rouge);color:var(--blanc);font-family:'Bebas Neue',sans-serif;font-size:0.95rem;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:5px;}
  .seq-item textarea{flex:1;background:var(--gris2);border:1px solid var(--gris3);color:var(--blanc);padding:7px 10px;font-size:0.86rem;outline:none;resize:vertical;min-height:55px;font-family:'IBM Plex Sans',sans-serif;}
  .seq-item textarea:focus{border-color:var(--or);}

  /* ACTIONS */
  .actions-bar{display:flex;gap:10px;padding-top:6px;flex-wrap:wrap;}
  .btn-save{background:var(--rouge);color:var(--blanc);border:none;padding:11px 26px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:2px;cursor:pointer;transition:background 0.2s;}
  .btn-save:hover{background:var(--rouge2);}
  .btn-save:disabled{background:var(--gris3);cursor:not-allowed;}
  .btn-outline{background:none;border:1px solid var(--or);color:var(--or);padding:11px 22px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
  .btn-outline:hover{background:var(--or);color:var(--noir);}
  .btn-danger{background:none;color:var(--gris4);border:1px solid var(--gris3);padding:11px 18px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin-left:auto;}
  .btn-danger:hover{color:var(--rouge2);border-color:var(--rouge2);}

  /* VUE LECTURE */
  .lecture-bloc{background:var(--gris1);border:1px solid var(--gris3);border-top:3px solid var(--rouge);padding:14px 18px;margin-bottom:14px;}
  .lecture-bloc h3{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--or);margin-bottom:9px;}
  .lecture-ligne{font-size:0.9rem;line-height:1.7;white-space:pre-wrap;}
  .res-link{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;margin:3px 3px 3px 0;text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;}
  .res-link.yt{background:#c0392b22;color:#e74c3c;border:1px solid #c0392b55;}
  .res-link.fb{background:#1877f222;color:#74a9f5;border:1px solid #1877f255;}
  .res-link.vid{background:#27ae6022;color:#2ecc71;border:1px solid #27ae6055;}
  .res-link.pdf{background:#d4a84322;color:#f1c40f;border:1px solid #d4a84355;}
  .seq-lecture{display:flex;gap:9px;align-items:flex-start;margin-bottom:7px;}
  .seq-num-sm{background:var(--rouge);color:var(--blanc);font-family:'Bebas Neue',sans-serif;font-size:0.85rem;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}

  /* MODAL LOGIN */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:center;justify-content:center;}
  .modal-box{background:var(--gris1);border:1px solid var(--gris3);border-top:3px solid var(--rouge);padding:32px;width:320px;display:flex;flex-direction:column;gap:16px;}
  .modal-box h2{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--or);}
  .modal-box p{font-size:0.82rem;color:var(--gris4);line-height:1.5;}
  .modal-box input{background:var(--gris2);border:1px solid var(--gris3);color:var(--blanc);padding:10px 12px;font-size:0.9rem;outline:none;width:100%;}
  .modal-box input:focus{border-color:var(--rouge);}
  .modal-err{color:var(--rouge2);font-size:0.8rem;display:none;}

  /* EMPTY */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:14px;color:var(--gris4);text-align:center;}
  .empty-state .big-icon{font-size:3.5rem;opacity:0.25;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;padding:11px 22px;font-family:'IBM Plex Mono',monospace;font-size:0.82rem;letter-spacing:1px;opacity:0;transform:translateY(16px);transition:all 0.3s;pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.ok{background:var(--vert);color:var(--blanc);}
  .toast.err{background:var(--rouge);color:var(--blanc);}
  .toast.info{background:var(--bleu);color:var(--blanc);}

  /* LIENS UTILES */
  .liens-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;max-width:860px;}
  .lien-card{background:var(--gris1);border:1px solid var(--gris3);border-left:4px solid var(--rouge);padding:16px 18px;text-decoration:none;display:flex;flex-direction:column;gap:6px;transition:all 0.2s;}
  .lien-card:hover{border-left-color:var(--or);background:var(--gris2);}
  .lien-card .lc-titre{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;color:var(--blanc);}
  .lien-card .lc-desc{font-size:0.78rem;color:var(--gris4);line-height:1.4;}
  .lien-card .lc-url{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--rouge2);margin-top:4px;word-break:break-all;}

  @media(max-width:600px){
    aside{display:none;}
    .content{padding:14px;}
    header{padding:10px 14px;}
    header h1{font-size:1.3rem;}
  }
  @media print{
    header,aside,.actions-bar,.btn-add-res,.btn-del,.btn-danger,.sync-status,.modal-overlay{display:none!important;}
    body{background:white;color:black;}
    .section-bloc,.lecture-bloc{border:1px solid #ccc;background:white;}
    .section-bloc h2,.lecture-bloc h3{color:#c0392b;}
  }
</style>
</head>
<body>

<header>
  <h1>COURS <span>JUDO</span> / JUJITSU</h1>
  <div class="header-right">
    <span class="sync-status" id="syncStatus">⟳ Chargement...</span>
    <button class="nav-btn" id="btnLiens" onclick="showPage('liens')">🔗 Liens</button>
    <button class="nav-btn active" id="btnCours" onclick="showPage('cours')">📋 Cours</button>
    <button class="nav-btn" id="btnLire" onclick="setMode('lire')">👁 Lire</button>
    <button class="nav-btn" id="btnEditer" onclick="setMode('editer')">✏️ Éditer</button>
    <button class="nav-btn or" id="btnConnexion" onclick="showLogin()">🔐 Connexion</button>
  </div>
</header>

<main>
  <aside>
    <div class="sidebar-title">Cours enregistrés</div>
    <button class="btn-nouveau" onclick="nouveauCours()">+ NOUVEAU COURS</button>
    <div class="cours-list" id="coursList"></div>
  </aside>
  <div class="content" id="mainContent">
    <div class="empty-state"><div class="big-icon">🥋</div><p>Chargement...</p></div>
  </div>
</main>

<!-- MODAL LOGIN -->
<div class="modal-overlay" id="modalLogin" style="display:none">
  <div class="modal-box">
    <h2>🔐 Connexion</h2>
    <p>Mot de passe pour éditer les cours.</p>
    <input type="password" id="inputMdp" placeholder="Mot de passe..." onkeydown="if(event.key==='Enter')validerLogin()">
    <div id="tokenZone" style="display:none">
      <p style="margin-top:4px;font-size:0.82rem;color:var(--gris4)">Token GitHub (première fois uniquement) :</p>
      <input type="password" id="inputToken" placeholder="ghp_...">
    </div>
    <div class="modal-err" id="loginErr">Mot de passe incorrect</div>
    <div style="display:flex;gap:10px">
      <button class="btn-save" onclick="validerLogin()" style="flex:1">ENTRER</button>
      <button class="btn-outline" onclick="fermerLogin()" style="flex:1">ANNULER</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================
// CONFIG
// =============================================
let ghToken      = localStorage.getItem('gh_token_cours') || '';
const GH_USER    = 'fabriceetchristiane-star';
const GH_REPO    = 'cours-judo';
const GH_FILE    = 'cours.json';
const RAW_URL    = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${GH_FILE}`;
const API_URL    = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;
const MOT_PASSE  = 'Judo@Fabrice2026';

// =============================================
// ÉTAT
// =============================================
let cours      = [];
let coursActif = null;
let modeActif  = 'lire';
let connecte   = false;
let ghSha      = '';
let pageActive = 'cours';
let ressources = [];
let sequence   = [];

const GROUPES = ['Adultes','Enfants','Poussins','Benjamins','Minimes','Cadets','Juniors','Mixte'];
const NIVEAUX = ['Tous niveaux','Débutants','Blanc-Jaune','Jaune-Orange','Orange-Verte','Verte-Bleu','Bleu-Marron','Marron-Noir','1er Dan +'];
const SPORTS  = ['Judo','Jujitsu','Judo + Jujitsu'];
const THEMES  = ['Technique debout','Ne waza','Kata','Kumikata','Déplacement','Enchaînement','Défense','Atemi','Compétition','Libre'];
const TYPE_RES= [
  {val:'youtube', label:'YouTube',  cls:'type-yt', lnk:'yt'},
  {val:'facebook',label:'Facebook', cls:'type-fb', lnk:'fb'},
  {val:'video',   label:'Vidéo PC', cls:'type-vid',lnk:'vid'},
  {val:'pdf',     label:'PDF/Doc',  cls:'type-pdf',lnk:'pdf'},
];

const LIENS_UTILES = [
  {titre:'Grades Judo', desc:'Site grades et techniques officielles FFJDA', url:'https://fabriceetchristiane-star.github.io/grades-Judo/', couleur:'#c0392b'},
  {titre:'Dojo Numérique', desc:'Site pédagogique du club JAK Lambersart', url:'https://fabriceetchristiane-star.github.io/num-rique-judo/', couleur:'#27ae60'},
  {titre:'YouTube — Playlist Judo', desc:'Tes playlists YouTube judo/jujitsu', url:'https://www.youtube.com', couleur:'#e74c3c'},
  {titre:'Facebook — Vidéos Judo', desc:'Tes playlists Facebook judo/jujitsu', url:'https://www.facebook.com', couleur:'#1877f2'},
  {titre:'FFJDA — Textes officiels', desc:'Règlements et grades officiels FFJDA', url:'https://www.ffjudo.com/textes-officiels', couleur:'#d4a843'},
  {titre:'Règlement des Grades PDF', desc:'PDF officiel règlement des grades 2025', url:'https://www.ffjudo.com/resource-file/document/1762434499_e99cb17966bb166426a2.pdf', couleur:'#d4a843'},
];

// =============================================
// GITHUB
// =============================================
async function chargerDepuisGitHub() {
  setSyncStatus('loading','⟳ Chargement...');
  try {
    const r = await fetch(RAW_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP '+r.status);
    cours = await r.json();
    const r2 = await fetch(API_URL, {headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json'}});
    if (r2.ok) { const d=await r2.json(); ghSha=d.sha||''; }
    setSyncStatus('ok','✓ Synchronisé');
    renderSidebar();
    afficherVide();
  } catch(e) {
    setSyncStatus('err','✗ Erreur réseau');
    showToast('Erreur chargement','err');
  }
}

async function sauvegarderSurGitHub() {
  setSyncStatus('loading','⟳ Sauvegarde...');
  const contenu = btoa(unescape(encodeURIComponent(JSON.stringify(cours,null,2))));
  const body = {message:'Cours mis à jour - '+new Date().toLocaleDateString('fr-FR'), content:contenu, branch:'main'};
  if (ghSha) body.sha = ghSha;
  try {
    const r = await fetch(API_URL, {
      method:'PUT',
      headers:{'Authorization':'token '+ghToken,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body: JSON.stringify(body)
    });
    if (!r.ok) { const e=await r.json(); throw new Error(e.message||'HTTP '+r.status); }
    const d = await r.json();
    if (d.content) ghSha = d.content.sha||ghSha;
    setSyncStatus('ok','✓ Sauvegardé');
    showToast('Cours sauvegardé !','ok');
  } catch(e) {
    setSyncStatus('err','✗ Erreur sauvegarde');
    showToast('Erreur : '+e.message,'err');
  }
}

// =============================================
// LOGIN
// =============================================
function showLogin() {
  if (connecte) { deconnecter(); return; }
  // Afficher champ token si pas encore enregistré
  document.getElementById('tokenZone').style.display =
    localStorage.getItem('gh_token_cours') ? 'none' : 'block';
  document.getElementById('loginErr').style.display = 'none';
  document.getElementById('inputMdp').value = '';
  document.getElementById('modalLogin').style.display = 'flex';
  document.getElementById('inputMdp').focus();
}
function fermerLogin() { document.getElementById('modalLogin').style.display='none'; }
function validerLogin() {
  const mdp = document.getElementById('inputMdp').value;
  if (mdp !== MOT_PASSE) {
    document.getElementById('loginErr').textContent = 'Mot de passe incorrect';
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('inputMdp').value = '';
    return;
  }
  // Sauvegarder token si champ visible et rempli
  const tokenInput = document.getElementById('inputToken');
  if (tokenInput && tokenInput.value.trim()) {
    localStorage.setItem('gh_token_cours', tokenInput.value.trim());
  }
  if (!localStorage.getItem('gh_token_cours')) {
    document.getElementById('loginErr').textContent = 'Entre ton token GitHub ci-dessus';
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('tokenZone').style.display = 'block';
    return;
  }
  connecte = true;
  ghToken = localStorage.getItem('gh_token_cours');
  fermerLogin();
  document.getElementById('btnConnexion').textContent = '🔓 Connecté';
  document.getElementById('btnConnexion').style.color = 'var(--vert)';
  showToast('Connecté — Mode édition actif', 'ok');
  setMode('editer');
}
function deconnecter() {
  connecte=false;
  document.getElementById('btnConnexion').textContent='🔐 Connexion';
  document.getElementById('btnConnexion').style.color='';
  setMode('lire');
  showToast('Déconnecté','info');
}

// =============================================
// PAGES
// =============================================
function showPage(page) {
  pageActive = page;
  document.getElementById('btnCours').classList.toggle('active', page==='cours');
  document.getElementById('btnLiens').classList.toggle('active', page==='liens');
  if (page==='liens') afficherLiens();
  else {
    if (coursActif!==null) {
      if (modeActif==='lire') afficherLecture(cours[coursActif]);
      else renderForm(cours[coursActif]);
    } else afficherVide();
  }
}

function afficherLiens() {
  document.getElementById('mainContent').innerHTML = `
    <div style="margin-bottom:20px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;margin-bottom:6px">🔗 LIENS UTILES</div>
      <div style="font-size:0.82rem;color:var(--gris4)">Tes sites, playlists et ressources officielles</div>
    </div>
    <div class="liens-grid">
      ${LIENS_UTILES.map(l=>`
        <a class="lien-card" href="${l.url}" target="_blank" style="border-left-color:${l.couleur}">
          <div class="lc-titre">${l.titre}</div>
          <div class="lc-desc">${l.desc}</div>
          <div class="lc-url">${l.url}</div>
        </a>`).join('')}
    </div>
    <div style="margin-top:28px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:var(--or);margin-bottom:12px">📁 RESSOURCES PC</div>
    <div style="font-size:0.85rem;color:var(--gris4);line-height:1.8;background:var(--gris1);border:1px solid var(--gris3);padding:16px 20px;max-width:600px;">
      <div style="color:var(--blanc);font-weight:600;margin-bottom:8px">Dossiers vidéos sur ton PC :</div>
      <div>📂 Techniques : <span style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--or)">C:\\Users\\Fabrice\\Desktop\\JUDO-CONTENU\\mouvement par ordre alfab\\</span></div>
      <div>📂 Fiches grades : <span style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--or)">C:\\Users\\Fabrice\\Desktop\\JUDO-CONTENU\\Fiche technique par grades\\</span></div>

      <div>📂 Déplacements : <span style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--or)">C:\\Users\\Fabrice\\Desktop\\JUDO-CONTENU\\0 déplacement\\</span></div>
      <div>📂 Katas : <span style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--or)">C:\\Users\\Fabrice\\Desktop\\JUDO-CONTENU\\0 KATA\\</span></div>

// =============================================
// SIDEBAR
// =============================================
function renderSidebar() {
  const list = document.getElementById('coursList');
  if (!cours.length) {
    list.innerHTML='<div style="color:var(--gris4);font-size:0.78rem;padding:6px 2px;">Aucun cours</div>';
    return;
  }
  list.innerHTML = cours.slice().reverse().map((c,ri)=>{
    const i = cours.length-1-ri;
    return `<div class="cours-item ${coursActif===i?'active':''}" onclick="chargerCours(${i})">
      <div class="ci-titre">${c.technique||'Sans titre'}</div>
      <div class="ci-meta">${c.date||'—'} · ${c.groupe||'—'}</div>
    </div>`;
  }).join('');
}

// =============================================
// MODE
// =============================================
function setMode(mode) {
  if (mode==='editer' && !connecte) { showLogin(); return; }
  modeActif = mode;
  document.getElementById('btnEditer').classList.toggle('active', mode==='editer');
  document.getElementById('btnLire').classList.toggle('active', mode==='lire');
  if (coursActif!==null) {
    if (mode==='lire') afficherLecture(cours[coursActif]);
    else renderForm(cours[coursActif]);
  }
}

// =============================================
// VUE LECTURE
// =============================================
function afficherVide() {
  document.getElementById('mainContent').innerHTML=`
    <div class="empty-state"><div class="big-icon">🥋</div>
    <p>Sélectionne un cours dans la liste<br>ou crée-en un nouveau.</p></div>`;
}

function afficherLecture(c) {
  const ressHtml = (c.ressources||[]).map(r=>{
    const info=TYPE_RES.find(t=>t.val===r.type)||TYPE_RES[0];
    const isExternal = r.type==='youtube'||r.type==='facebook';
    const href = isExternal ? r.valeur : '#';
    const label = isExternal ? '▶ '+r.valeur.substring(0,45) : '📁 '+(r.valeur.split('\\').pop()||r.valeur);
    return `<a class="res-link ${info.lnk}" href="${href}" target="_blank">${label}</a>`;
  }).join('');
  const seqHtml = (c.sequence||[]).filter(s=>s).map((s,i)=>
    `<div class="seq-lecture"><div class="seq-num-sm">${i+1}</div><div style="font-size:0.88rem;line-height:1.6">${s}</div></div>`
  ).join('');

  document.getElementById('mainContent').innerHTML=`
  <div style="max-width:700px">
    <div style="margin-bottom:18px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px">${c.technique||'Sans titre'}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--gris4);margin-top:4px">
        ${[c.date,c.sport,c.groupe,c.niveau,c.theme,c.duree?c.duree+' min':''].filter(Boolean).join(' · ')}
      </div>
      ${c.objectif?`<div style="margin-top:8px;color:var(--or);font-size:0.88rem">🎯 ${c.objectif}</div>`:''}
    </div>
    ${lecBloc('🔥 Échauffement',c.echauf)}
    ${lecBloc('⚡ Technique — Points clés',c.desc)}
    ${(c.ressources||[]).length?`<div class="lecture-bloc"><h3>🎬 Ressources</h3>${ressHtml}</div>`:''}
    ${seqHtml?`<div class="lecture-bloc"><h3>📐 Séquence</h3>${seqHtml}</div>`:''}
    ${lecBloc2('🔄 Défenses',c.defenses,'🔗 Enchaînements',c.enchainements)}
    ${lecBloc('👣 Déplacements & Opportunités',c.deplacements)}
    ${lecBloc('📝 Notes',c.notes)}
    <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">
      ${connecte?`<button class="btn-save" onclick="setMode('editer')">✏️ MODIFIER</button>`:''}
      <button class="btn-outline" onclick="window.print()">🖨 IMPRIMER</button>
    </div>
  </div>`;
}

function lecBloc(t,v){if(!v)return'';return`<div class="lecture-bloc"><h3>${t}</h3><div class="lecture-ligne">${v}</div></div>`;}
function lecBloc2(t1,v1,t2,v2){
  if(!v1&&!v2)return'';
  return`<div class="lecture-bloc"><h3>${t1} / ${t2}</h3>
    <div style="display:flex;gap:18px;flex-wrap:wrap">
      ${v1?`<div style="flex:1;min-width:180px"><div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris4);margin-bottom:5px">${t1}</div><div class="lecture-ligne">${v1}</div></div>`:''}
      ${v2?`<div style="flex:1;min-width:180px"><div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris4);margin-bottom:5px">${t2}</div><div class="lecture-ligne">${v2}</div></div>`:''}
    </div></div>`;
}

// =============================================
// FORMULAIRE
// =============================================
function nouveauCours() {
  if (!connecte) { showLogin(); return; }
  coursActif=null; renderSidebar(); renderForm({});
}

function renderForm(c) {
  pageActive='cours';
  document.getElementById('btnCours').classList.add('active');
  document.getElementById('btnLiens').classList.remove('active');
  document.getElementById('mainContent').innerHTML=`
  <div class="form-cours">
    <div class="section-bloc">
      <h2>📋 Informations générales</h2>
      <div class="field-row">
        <div class="field"><label>Technique principale</label>
          <input type="text" id="f_technique" placeholder="Ex: O-soto-gari, Juji-gatame..." value="${c.technique||''}"></div>
        <div class="field" style="max-width:150px"><label>Date</label>
          <input type="date" id="f_date" value="${c.date||new Date().toISOString().split('T')[0]}"></div>
      </div>
      <div class="field-row" style="margin-top:12px">
        <div class="field"><label>Sport</label><select id="f_sport">${SPORTS.map(s=>`<option ${c.sport===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="field"><label>Groupe</label><select id="f_groupe">${GROUPES.map(g=>`<option ${c.groupe===g?'selected':''}>${g}</option>`).join('')}</select></div>
        <div class="field"><label>Niveau</label><select id="f_niveau">${NIVEAUX.map(n=>`<option ${c.niveau===n?'selected':''}>${n}</option>`).join('')}</select></div>
        <div class="field"><label>Thème</label><select id="f_theme">${THEMES.map(t=>`<option ${c.theme===t?'selected':''}>${t}</option>`).join('')}</select></div>
      </div>
      <div class="field-row" style="margin-top:12px">
        <div class="field"><label>Durée (min)</label><input type="number" id="f_duree" placeholder="60" value="${c.duree||''}"></div>
        <div class="field" style="flex:3"><label>Objectif</label>
          <input type="text" id="f_objectif" placeholder="Ce que les élèves doivent retenir..." value="${c.objectif||''}"></div>
      </div>
    </div>
    <div class="section-bloc"><h2>🔥 Échauffement</h2>
      <div class="field"><textarea id="f_echauf" rows="3" placeholder="Jeux, ukemi, déplacements, kumikata...">${c.echauf||''}</textarea></div>
    </div>
    <div class="section-bloc"><h2>⚡ Technique & Ressources</h2>
      <div class="field" style="margin-bottom:14px"><label>Points clés</label>
        <textarea id="f_desc" rows="3" placeholder="Kuzushi, tsukuri, kake, placement...">${c.desc||''}</textarea></div>
      <div style="margin-bottom:8px;font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris4);font-family:'IBM Plex Mono',monospace;">Vidéos & Documents</div>
      <div id="ressources_list"></div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:7px">
        <button class="btn-add-res" onclick="addRessource('youtube')">+ YouTube</button>
        <button class="btn-add-res" onclick="addRessource('facebook')">+ Facebook</button>
        <button class="btn-add-res" onclick="addRessource('video')">+ Vidéo PC</button>
        <button class="btn-add-res" onclick="addRessource('pdf')">+ PDF</button>
      </div>
    </div>
    <div class="section-bloc"><h2>📐 Séquence pédagogique</h2>
      <div id="sequence_list"></div>
      <button class="btn-add-res" onclick="addSequence()" style="margin-top:7px">+ Ajouter étape</button>
    </div>
    <div class="section-bloc"><h2>🔄 Défenses & Enchaînements</h2>
      <div class="field-row">
        <div class="field"><label>Défenses</label>
          <textarea id="f_defenses" rows="4" placeholder="Esquive → Ko-uchi-gari...">${c.defenses||''}</textarea></div>
        <div class="field"><label>Enchaînements</label>
          <textarea id="f_enchainements" rows="4" placeholder="O-soto-gari → Ko-uchi-gari...">${c.enchainements||''}</textarea></div>
      </div>
    </div>
    <div class="section-bloc"><h2>👣 Déplacements & Opportunités</h2>
      <div class="field"><textarea id="f_deplacements" rows="3" placeholder="Avant, arrière, diagonal, opportunités...">${c.deplacements||''}</textarea></div>
    </div>
    <div class="section-bloc"><h2>📝 Notes</h2>
      <div class="field"><textarea id="f_notes" rows="3" placeholder="Observations, points à retravailler...">${c.notes||''}</textarea></div>
    </div>
    <div class="actions-bar">
      <button class="btn-save" id="btnSave" onclick="sauvegarder()">💾 ENREGISTRER</button>
      <button class="btn-outline" onclick="window.print()">🖨 IMPRIMER</button>
      ${coursActif!==null?`<button class="btn-danger" onclick="supprimerCours()">🗑 SUPPRIMER</button>`:''}
    </div>
  </div>`;
  ressources = c.ressources ? JSON.parse(JSON.stringify(c.ressources)) : [];
  sequence   = c.sequence   ? [...c.sequence] : ['','',''];
  renderRessources(); renderSequence();
}

// =============================================
// RESSOURCES
// =============================================
function addRessource(type){ressources.push({type,valeur:''});renderRessources();}
function delRessource(i){ressources.splice(i,1);renderRessources();}
function renderRessources(){
  const el=document.getElementById('ressources_list');if(!el)return;
  el.innerHTML=ressources.map((r,i)=>{
    const info=TYPE_RES.find(t=>t.val===r.type)||TYPE_RES[0];
    const ph=r.type==='video'?'Chemin PC: C:\\Users\\Fabrice\\Desktop\\JUDO-CONTENU\\mouvement par ordre alfab\\Hadaka Jime.mp4'
            :r.type==='pdf'  ?'Chemin PC: C:\\Users\\Fabrice\\Desktop\\JUDO-CONTENU\\Fiche technique par grades\\...'
            :'Coller le lien URL...';
    return`<div class="ressource-line">
      <span class="type-badge ${info.cls}">${info.label}</span>
      <input type="text" value="${r.valeur||''}" placeholder="${ph}" oninput="ressources[${i}].valeur=this.value">
      <button class="btn-del" onclick="delRessource(${i})">✕</button>
    </div>`;
  }).join('');
}

// =============================================
// SÉQUENCE
// =============================================
function addSequence(){sequence.push('');renderSequence();}
function delSequence(i){sequence.splice(i,1);renderSequence();}
function renderSequence(){
  const el=document.getElementById('sequence_list');if(!el)return;
  el.innerHTML=sequence.map((s,i)=>`
    <div class="seq-item">
      <div class="seq-num">${i+1}</div>
      <textarea placeholder="Ex: Démonstration · Exercice par paires · Randori..." oninput="sequence[${i}]=this.value">${s}</textarea>
      <button class="btn-del" onclick="delSequence(${i})" style="margin-top:5px">✕</button>
    </div>`).join('');
}

// =============================================
// SAUVEGARDER / CHARGER / SUPPRIMER
// =============================================
async function sauvegarder(){
  if(!connecte){showLogin();return;}
  const btn=document.getElementById('btnSave');
  if(btn){btn.disabled=true;btn.textContent='⟳ Sauvegarde...';}
  const c={
    technique:    document.getElementById('f_technique').value,
    date:         document.getElementById('f_date').value,
    sport:        document.getElementById('f_sport').value,
    groupe:       document.getElementById('f_groupe').value,
    niveau:       document.getElementById('f_niveau').value,
    theme:        document.getElementById('f_theme').value,
    duree:        document.getElementById('f_duree').value,
    objectif:     document.getElementById('f_objectif').value,
    echauf:       document.getElementById('f_echauf').value,
    desc:         document.getElementById('f_desc').value,
    defenses:     document.getElementById('f_defenses').value,
    enchainements:document.getElementById('f_enchainements').value,
    deplacements: document.getElementById('f_deplacements').value,
    notes:        document.getElementById('f_notes').value,
    ressources:   JSON.parse(JSON.stringify(ressources)),
    sequence:     [...sequence],
  };
  if(coursActif!==null)cours[coursActif]=c;
  else{cours.push(c);coursActif=cours.length-1;}
  await sauvegarderSurGitHub();
  renderSidebar();
  if(btn){btn.disabled=false;btn.textContent='💾 ENREGISTRER';}
}

function chargerCours(i){
  coursActif=i;renderSidebar();
  if(modeActif==='lire')afficherLecture(cours[i]);
  else renderForm(cours[i]);
}

async function supprimerCours(){
  if(!confirm('Supprimer ce cours ?'))return;
  cours.splice(coursActif,1);coursActif=null;
  await sauvegarderSurGitHub();
  renderSidebar();afficherVide();
}

// =============================================
// UTILITAIRES
// =============================================
function setSyncStatus(type,msg){
  const el=document.getElementById('syncStatus');
  el.textContent=msg;el.className='sync-status '+type;
}
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2800);
}

// Init — lecture seule par défaut, pas besoin de connexion
document.getElementById('btnEditer').style.display='';
modeActif='lire';
document.getElementById('btnLire').classList.add('active');
chargerDepuisGitHub();
</script>
