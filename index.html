<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Préparation de Cours — Judo / Jujitsu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;600&family=IBM+Plex+Mono:wght@400;600&display=swap');
  :root {
    --noir:#0d0d0d; --blanc:#f2f0eb; --rouge:#c0392b; --rouge2:#e74c3c;
    --gris1:#1a1a1a; --gris2:#2a2a2a; --gris3:#3d3d3d; --gris4:#888;
    --or:#d4a843; --vert:#27ae60; --bleu:#2980b9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--noir);color:var(--blanc);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}
  header{background:var(--gris1);border-bottom:3px solid var(--rouge);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;}
  header h1 span{color:var(--rouge);}
  .header-right{display:flex;align-items:center;gap:16px;}
  .sync-status{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--gris4);letter-spacing:1px;}
  .sync-status.ok{color:var(--vert);}
  .sync-status.err{color:var(--rouge2);}
  .sync-status.loading{color:var(--or);}
  .nav-btn{background:var(--gris2);color:var(--gris4);border:1px solid var(--gris3);padding:8px 18px;font-family:'IBM Plex Mono',monospace;font-size:0.75rem;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
  .nav-btn:hover,.nav-btn.active{background:var(--rouge);color:var(--blanc);border-color:var(--rouge);}
  main{display:flex;min-height:calc(100vh - 65px);}
  aside{width:280px;min-width:280px;background:var(--gris1);border-right:1px solid var(--gris3);padding:20px 16px;display:flex;flex-direction:column;gap:12px;}
  .sidebar-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--gris4);text-transform:uppercase;}
  .cours-list{display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:70vh;}
  .cours-item{background:var(--gris2);border:1px solid var(--gris3);border-left:3px solid var(--gris3);padding:10px 12px;cursor:pointer;transition:all 0.15s;}
  .cours-item:hover,.cours-item.active{border-left-color:var(--rouge);background:var(--gris3);}
  .ci-titre{font-weight:600;font-size:0.9rem;}
  .ci-meta{font-size:0.72rem;color:var(--gris4);margin-top:3px;font-family:'IBM Plex Mono',monospace;}
  .btn-nouveau{background:var(--rouge);color:var(--blanc);border:none;padding:12px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;cursor:pointer;width:100%;transition:background 0.2s;}
  .btn-nouveau:hover{background:var(--rouge2);}
  .content{flex:1;padding:28px 36px;overflow-y:auto;}
  .form-cours{display:flex;flex-direction:column;gap:24px;max-width:860px;}
  .section-bloc{background:var(--gris1);border:1px solid var(--gris3);border-top:3px solid var(--rouge);padding:20px 24px;}
  .section-bloc h2{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:var(--or);margin-bottom:16px;}
  .field-row{display:flex;gap:16px;flex-wrap:wrap;}
  .field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:180px;}
  .field label{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris4);font-family:'IBM Plex Mono',monospace;}
  .field input,.field select,.field textarea{background:var(--gris2);border:1px solid var(--gris3);color:var(--blanc);padding:10px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;resize:vertical;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--rouge);}
  .field select option{background:var(--gris2);}
  .ressource-line{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .ressource-line input{flex:1;min-width:200px;background:var(--gris2);border:1px solid var(--gris3);color:var(--blanc);padding:8px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:0.85rem;outline:none;}
  .ressource-line input:focus{border-color:var(--bleu);}
  .type-badge{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;padding:4px 10px;letter-spacing:1px;white-space:nowrap;}
  .type-yt{background:#c0392b22;color:#e74c3c;border:1px solid #c0392b55;}
  .type-fb{background:#1877f222;color:#74a9f5;border:1px solid #1877f255;}
  .type-vid{background:#27ae6022;color:#2ecc71;border:1px solid #27ae6055;}
  .type-pdf{background:#d4a84322;color:#f1c40f;border:1px solid #d4a84355;}
  .btn-add-res{background:none;border:1px dashed var(--gris3);color:var(--gris4);padding:7px 16px;cursor:pointer;font-size:0.8rem;transition:all 0.2s;font-family:'IBM Plex Mono',monospace;}
  .btn-add-res:hover{border-color:var(--bleu);color:var(--bleu);}
  .btn-del{background:none;border:none;color:var(--gris4);cursor:pointer;font-size:1rem;padding:4px 8px;transition:color 0.2s;}
  .btn-del:hover{color:var(--rouge2);}
  .seq-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
  .seq-num{background:var(--rouge);color:var(--blanc);font-family:'Bebas Neue',sans-serif;font-size:1rem;width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:6px;}
  .seq-item textarea{flex:1;background:var(--gris2);border:1px solid var(--gris3);color:var(--blanc);padding:8px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:0.88rem;outline:none;resize:vertical;min-height:60px;}
  .seq-item textarea:focus{border-color:var(--or);}
  .actions-bar{display:flex;gap:12px;padding-top:8px;flex-wrap:wrap;}
  .btn-save{background:var(--rouge);color:var(--blanc);border:none;padding:12px 28px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;cursor:pointer;transition:background 0.2s;}
  .btn-save:hover{background:var(--rouge2);}
  .btn-save:disabled{background:var(--gris3);cursor:not-allowed;}
  .btn-print{background:none;color:var(--or);border:1px solid var(--or);padding:12px 28px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
  .btn-print:hover{background:var(--or);color:var(--noir);}
  .btn-del-cours{background:none;color:var(--gris4);border:1px solid var(--gris3);padding:12px 20px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin-left:auto;}
  .btn-del-cours:hover{color:var(--rouge2);border-color:var(--rouge2);}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px;color:var(--gris4);text-align:center;}
  .empty-state .big-icon{font-size:4rem;opacity:0.3;}
  .toast{position:fixed;bottom:28px;right:28px;padding:12px 24px;font-family:'IBM Plex Mono',monospace;font-size:0.85rem;letter-spacing:1px;opacity:0;transform:translateY(20px);transition:all 0.3s;pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.ok{background:var(--vert);color:var(--blanc);}
  .toast.err{background:var(--rouge);color:var(--blanc);}
  .toast.info{background:var(--bleu);color:var(--blanc);}
  /* Vue lecture (téléphone) */
  .lecture-bloc{background:var(--gris1);border:1px solid var(--gris3);border-top:3px solid var(--rouge);padding:16px 20px;margin-bottom:16px;}
  .lecture-bloc h3{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--or);margin-bottom:10px;}
  .lecture-ligne{font-size:0.9rem;line-height:1.7;white-space:pre-wrap;}
  .res-link{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;margin:4px 4px 4px 0;text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:0.75rem;border-radius:2px;}
  .res-link.yt{background:#c0392b22;color:#e74c3c;border:1px solid #c0392b55;}
  .res-link.fb{background:#1877f222;color:#74a9f5;border:1px solid #1877f255;}
  .res-link.vid{background:#27ae6022;color:#2ecc71;border:1px solid #27ae6055;}
  .res-link.pdf{background:#d4a84322;color:#f1c40f;border:1px solid #d4a84355;}
  .seq-lecture{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
  .seq-num-sm{background:var(--rouge);color:var(--blanc);font-family:'Bebas Neue',sans-serif;font-size:0.9rem;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
  @media(max-width:600px){
    aside{display:none;}
    .content{padding:16px;}
    header{padding:12px 16px;}
    header h1{font-size:1.4rem;}
  }
  @media print{
    header,aside,.actions-bar,.btn-add-res,.btn-del,.btn-del-cours,.sync-status{display:none!important;}
    body{background:white;color:black;}
    .section-bloc,.lecture-bloc{border:1px solid #ccc;background:white;}
    .section-bloc h2,.lecture-bloc h3{color:#c0392b;}
  }
</style>
</head>
<body>
<header>
  <h1>COURS <span>JUDO</span> / JUJITSU</h1>
  <div class="header-right">
    <span class="sync-status" id="syncStatus">⟳ Chargement...</span>
    <button class="nav-btn active" id="btnEditer" onclick="setMode('editer')">✏️ Éditer</button>
    <button class="nav-btn" id="btnLire" onclick="setMode('lire')">👁 Lire</button>
    <button class="nav-btn" onclick="nouveauCours()">+ Nouveau</button>
  </div>
</header>
<main>
  <aside>
    <div class="sidebar-title">Cours enregistrés</div>
    <button class="btn-nouveau" onclick="nouveauCours()">+ NOUVEAU COURS</button>
    <div class="cours-list" id="coursList"></div>
  </aside>
  <div class="content" id="mainContent">
    <div class="empty-state"><div class="big-icon">🥋</div><p>Chargement des cours...</p></div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script src="config.js"></script>
<script>
// =============================================
// CONFIG GITHUB (lue depuis config.js)
// =============================================
const GH_TOKEN = GH_CONFIG.token;
const GH_USER  = GH_CONFIG.user;
const GH_REPO  = GH_CONFIG.repo;
const GH_FILE  = 'cours.json';
const RAW_URL  = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${GH_FILE}`;
const API_URL  = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

// =============================================
// DONNÉES
// =============================================
let cours = [];
let coursActif = null;
let modeActif = 'editer';
let ghSha = '';

const GROUPES  = ['Adultes','Enfants','Poussins','Benjamins','Minimes','Cadets','Juniors','Mixte'];
const NIVEAUX  = ['Tous niveaux','Débutants','Blanc-Jaune','Jaune-Orange','Orange-Verte','Verte-Bleu','Bleu-Marron','Marron-Noir','1er Dan +'];
const SPORTS   = ['Judo','Jujitsu','Judo + Jujitsu'];
const THEMES   = ['Technique debout','Ne waza','Kata','Kumikata','Déplacement','Enchaînement','Défense','Atemi','Compétition','Libre'];
const TYPE_RES = [
  {val:'youtube', label:'YouTube',   cls:'type-yt',  lnk:'yt'},
  {val:'facebook',label:'Facebook',  cls:'type-fb',  lnk:'fb'},
  {val:'video',   label:'Vidéo PC',  cls:'type-vid', lnk:'vid'},
  {val:'pdf',     label:'PDF / Doc', cls:'type-pdf', lnk:'pdf'},
];

// =============================================
// GITHUB : CHARGER
// =============================================
async function chargerDepuisGitHub() {
  setSyncStatus('loading','⟳ Chargement...');
  try {
    const r = await fetch(RAW_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    cours = await r.json();
    // Récupérer le SHA pour les sauvegardes
    const r2 = await fetch(API_URL, {headers:{'Authorization':'token '+GH_TOKEN}});
    if (r2.ok) { const d = await r2.json(); ghSha = d.sha || ''; }
    setSyncStatus('ok','✓ Synchronisé');
    renderSidebar();
    if (cours.length === 0) afficherVide();
    else if (coursActif !== null) chargerCours(coursActif);
    else afficherVide();
  } catch(e) {
    setSyncStatus('err','✗ Hors ligne');
    showToast('Chargement hors ligne','info');
    renderSidebar();
    afficherVide();
  }
}

// =============================================
// GITHUB : SAUVEGARDER
// =============================================
async function sauvegarderSurGitHub() {
  setSyncStatus('loading','⟳ Sauvegarde...');
  const contenu = btoa(unescape(encodeURIComponent(JSON.stringify(cours, null, 2))));
  const body = {
    message: 'Mise à jour cours - ' + new Date().toLocaleDateString('fr-FR'),
    content: contenu,
    branch: 'main'
  };
  if (ghSha) body.sha = ghSha;
  try {
    const r = await fetch(API_URL, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + GH_TOKEN,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    ghSha = d.content && d.content.sha ? d.content.sha : ghSha;
    setSyncStatus('ok','✓ Sauvegardé');
    showToast('Cours sauvegardé !','ok');
  } catch(e) {
    setSyncStatus('err','✗ Erreur sauvegarde');
    showToast('Erreur : ' + e.message,'err');
  }
}

// =============================================
// SIDEBAR
// =============================================
function renderSidebar() {
  const list = document.getElementById('coursList');
  if (cours.length === 0) {
    list.innerHTML = '<div style="color:var(--gris4);font-size:0.8rem;padding:8px 4px;">Aucun cours enregistré</div>';
    return;
  }
  list.innerHTML = cours.slice().reverse().map((c,ri) => {
    const i = cours.length - 1 - ri;
    return `<div class="cours-item ${coursActif===i?'active':''}" onclick="chargerCours(${i})">
      <div class="ci-titre">${c.technique||'Sans titre'}</div>
      <div class="ci-meta">${c.date||'—'} · ${c.groupe||'—'} · ${c.sport||'—'}</div>
    </div>`;
  }).join('');
}

// =============================================
// MODES
// =============================================
function setMode(mode) {
  modeActif = mode;
  document.getElementById('btnEditer').classList.toggle('active', mode==='editer');
  document.getElementById('btnLire').classList.toggle('active', mode==='lire');
  if (coursActif !== null) {
    if (mode === 'lire') afficherLecture(cours[coursActif]);
    else renderForm(cours[coursActif]);
  }
}

// =============================================
// VUE LECTURE (téléphone)
// =============================================
function afficherLecture(c) {
  const el = document.getElementById('mainContent');
  const ressourcesHtml = (c.ressources||[]).map(r => {
    const info = TYPE_RES.find(t=>t.val===r.type)||TYPE_RES[0];
    const href = r.type==='video'||r.type==='pdf' ? '#' : r.valeur;
    const label = r.type==='video'||r.type==='pdf' ? '📁 ' + (r.valeur.split('\\').pop()||r.valeur) : '▶ ' + r.valeur.substring(0,50);
    return `<a class="res-link ${info.lnk}" href="${href}" target="_blank">${label}</a>`;
  }).join('');

  const seqHtml = (c.sequence||[]).filter(s=>s).map((s,i) =>
    `<div class="seq-lecture"><div class="seq-num-sm">${i+1}</div><div style="font-size:0.9rem;line-height:1.6">${s}</div></div>`
  ).join('');

  el.innerHTML = `
  <div style="max-width:700px">
    <div style="margin-bottom:20px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px">${c.technique||'Sans titre'}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--gris4);margin-top:4px">
        ${c.date||''} · ${c.sport||''} · ${c.groupe||''} · ${c.niveau||''} · ${c.theme||''} ${c.duree?'· '+c.duree+' min':''}
      </div>
      ${c.objectif?`<div style="margin-top:8px;color:var(--or);font-size:0.9rem">🎯 ${c.objectif}</div>`:''}
    </div>
    ${bloc('🔥 Échauffement', c.echauf)}
    ${bloc('⚡ Technique — Points clés', c.desc)}
    ${(c.ressources||[]).length?`<div class="lecture-bloc"><h3>🎬 Ressources</h3>${ressourcesHtml}</div>`:''}
    ${seqHtml?`<div class="lecture-bloc"><h3>📐 Séquence</h3>${seqHtml}</div>`:''}
    ${bloc2('🔄 Défenses', c.defenses, '🔗 Enchaînements', c.enchainements)}
    ${bloc('👣 Déplacements & Opportunités', c.deplacements)}
    ${bloc('📝 Notes', c.notes)}
    <div style="margin-top:20px;display:flex;gap:10px">
      <button class="btn-save" onclick="setMode('editer')">✏️ MODIFIER</button>
      <button class="btn-print" onclick="window.print()">🖨 IMPRIMER</button>
    </div>
  </div>`;
}

function bloc(titre, val) {
  if (!val) return '';
  return `<div class="lecture-bloc"><h3>${titre}</h3><div class="lecture-ligne">${val}</div></div>`;
}
function bloc2(t1, v1, t2, v2) {
  if (!v1 && !v2) return '';
  return `<div class="lecture-bloc"><h3>${t1} / ${t2}</h3>
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      ${v1?`<div style="flex:1;min-width:200px"><div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris4);margin-bottom:6px">${t1}</div><div class="lecture-ligne">${v1}</div></div>`:''}
      ${v2?`<div style="flex:1;min-width:200px"><div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris4);margin-bottom:6px">${t2}</div><div class="lecture-ligne">${v2}</div></div>`:''}
    </div></div>`;
}

// =============================================
// FORMULAIRE ÉDITION
// =============================================
let ressources = [];
let sequence   = [];

function nouveauCours() {
  coursActif = null;
  renderSidebar();
  renderForm({});
}

function afficherVide() {
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-state"><div class="big-icon">🥋</div>
    <p>Aucun cours sélectionné.<br>Crée un nouveau cours ou sélectionne-en un dans la liste.</p></div>`;
}

function renderForm(c) {
  modeActif = 'editer';
  document.getElementById('btnEditer').classList.add('active');
  document.getElementById('btnLire').classList.remove('active');
  const content = document.getElementById('mainContent');
  content.innerHTML = `
  <div class="form-cours">
    <div class="section-bloc">
      <h2>📋 Informations générales</h2>
      <div class="field-row">
        <div class="field"><label>Technique principale</label>
          <input type="text" id="f_technique" placeholder="Ex: O-soto-gari, Juji-gatame..." value="${c.technique||''}"></div>
        <div class="field" style="max-width:160px"><label>Date</label>
          <input type="date" id="f_date" value="${c.date||new Date().toISOString().split('T')[0]}"></div>
      </div>
      <div class="field-row" style="margin-top:14px">
        <div class="field"><label>Sport</label><select id="f_sport">${SPORTS.map(s=>`<option ${c.sport===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="field"><label>Groupe</label><select id="f_groupe">${GROUPES.map(g=>`<option ${c.groupe===g?'selected':''}>${g}</option>`).join('')}</select></div>
        <div class="field"><label>Niveau</label><select id="f_niveau">${NIVEAUX.map(n=>`<option ${c.niveau===n?'selected':''}>${n}</option>`).join('')}</select></div>
        <div class="field"><label>Thème</label><select id="f_theme">${THEMES.map(t=>`<option ${c.theme===t?'selected':''}>${t}</option>`).join('')}</select></div>
      </div>
      <div class="field-row" style="margin-top:14px">
        <div class="field"><label>Durée (min)</label><input type="number" id="f_duree" placeholder="60" value="${c.duree||''}"></div>
        <div class="field" style="flex:3"><label>Objectif du cours</label>
          <input type="text" id="f_objectif" placeholder="Ce que les élèves doivent retenir..." value="${c.objectif||''}"></div>
      </div>
    </div>
    <div class="section-bloc"><h2>🔥 Échauffement</h2>
      <div class="field"><label>Contenu échauffement</label>
        <textarea id="f_echauf" rows="3" placeholder="Jeux, ukemi, déplacements, kumikata...">${c.echauf||''}</textarea></div>
    </div>
    <div class="section-bloc"><h2>⚡ Technique principale & Ressources</h2>
      <div class="field" style="margin-bottom:16px"><label>Description / Points clés</label>
        <textarea id="f_desc" rows="3" placeholder="Placement, kuzushi, tsukuri, kake...">${c.desc||''}</textarea></div>
      <div style="margin-bottom:10px;font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris4);font-family:'IBM Plex Mono',monospace;">Vidéos & Documents</div>
      <div id="ressources_list"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
        <button class="btn-add-res" onclick="addRessource('youtube')">+ YouTube</button>
        <button class="btn-add-res" onclick="addRessource('facebook')">+ Facebook</button>
        <button class="btn-add-res" onclick="addRessource('video')">+ Vidéo PC</button>
        <button class="btn-add-res" onclick="addRessource('pdf')">+ PDF</button>
      </div>
    </div>
    <div class="section-bloc"><h2>📐 Séquence pédagogique</h2>
      <div id="sequence_list"></div>
      <button class="btn-add-res" onclick="addSequence()" style="margin-top:8px">+ Ajouter une étape</button>
    </div>
    <div class="section-bloc"><h2>🔄 Défenses & Enchaînements</h2>
      <div class="field-row">
        <div class="field"><label>Défenses sur cette technique</label>
          <textarea id="f_defenses" rows="4" placeholder="Esquive extérieure → Ko-uchi-gari...">${c.defenses||''}</textarea></div>
        <div class="field"><label>Enchaînements possibles</label>
          <textarea id="f_enchainements" rows="4" placeholder="O-soto-gari → Ko-uchi-gari...">${c.enchainements||''}</textarea></div>
      </div>
    </div>
    <div class="section-bloc"><h2>👣 Déplacements & Opportunités</h2>
      <div class="field"><textarea id="f_deplacements" rows="3" placeholder="Avant, arrière, diagonal, opportunités...">${c.deplacements||''}</textarea></div>
    </div>
    <div class="section-bloc"><h2>📝 Notes & Observations</h2>
      <div class="field"><textarea id="f_notes" rows="3" placeholder="Observations sur le groupe, points à retravailler...">${c.notes||''}</textarea></div>
    </div>
    <div class="actions-bar">
      <button class="btn-save" id="btnSave" onclick="sauvegarder()">💾 ENREGISTRER</button>
      <button class="btn-print" onclick="window.print()">🖨 IMPRIMER</button>
      ${coursActif!==null?`<button class="btn-del-cours" onclick="supprimerCours()">🗑 SUPPRIMER</button>`:''}
    </div>
  </div>`;

  ressources = c.ressources ? JSON.parse(JSON.stringify(c.ressources)) : [];
  sequence   = c.sequence   ? [...c.sequence] : ['','',''];
  renderRessources();
  renderSequence();
}

// =============================================
// RESSOURCES
// =============================================
function addRessource(type) { ressources.push({type,valeur:''}); renderRessources(); }
function delRessource(i)    { ressources.splice(i,1); renderRessources(); }
function renderRessources() {
  const el = document.getElementById('ressources_list'); if(!el)return;
  el.innerHTML = ressources.map((r,i) => {
    const info = TYPE_RES.find(t=>t.val===r.type)||TYPE_RES[0];
    const ph = r.type==='video'?'Chemin PC ex: C:\\JUDO-CONTENU\\mouvement par ordre alfab\\Hadaka Jime.mp4'
             : r.type==='pdf'  ?'Chemin PC ex: C:\\JUDO-CONTENU\\Fiche technique par grades\\...'
             : 'Coller le lien URL...';
    return `<div class="ressource-line">
      <span class="type-badge ${info.cls}">${info.label}</span>
      <input type="text" value="${r.valeur||''}" placeholder="${ph}"
             oninput="ressources[${i}].valeur=this.value">
      <button class="btn-del" onclick="delRessource(${i})">✕</button>
    </div>`;
  }).join('');
}

// =============================================
// SÉQUENCE
// =============================================
function addSequence() { sequence.push(''); renderSequence(); }
function delSequence(i) { sequence.splice(i,1); renderSequence(); }
function renderSequence() {
  const el = document.getElementById('sequence_list'); if(!el)return;
  el.innerHTML = sequence.map((s,i) => `
    <div class="seq-item">
      <div class="seq-num">${i+1}</div>
      <textarea placeholder="Ex: Démonstration · Exercice par paires · Randori..."
                oninput="sequence[${i}]=this.value">${s}</textarea>
      <button class="btn-del" onclick="delSequence(${i})" style="margin-top:6px">✕</button>
    </div>`).join('');
}

// =============================================
// SAUVEGARDER
// =============================================
async function sauvegarder() {
  const btn = document.getElementById('btnSave');
  if(btn) { btn.disabled=true; btn.textContent='⟳ Sauvegarde...'; }
  const c = {
    technique:     document.getElementById('f_technique').value,
    date:          document.getElementById('f_date').value,
    sport:         document.getElementById('f_sport').value,
    groupe:        document.getElementById('f_groupe').value,
    niveau:        document.getElementById('f_niveau').value,
    theme:         document.getElementById('f_theme').value,
    duree:         document.getElementById('f_duree').value,
    objectif:      document.getElementById('f_objectif').value,
    echauf:        document.getElementById('f_echauf').value,
    desc:          document.getElementById('f_desc').value,
    defenses:      document.getElementById('f_defenses').value,
    enchainements: document.getElementById('f_enchainements').value,
    deplacements:  document.getElementById('f_deplacements').value,
    notes:         document.getElementById('f_notes').value,
    ressources:    JSON.parse(JSON.stringify(ressources)),
    sequence:      [...sequence],
  };
  if(coursActif!==null) cours[coursActif]=c;
  else { cours.push(c); coursActif=cours.length-1; }
  await sauvegarderSurGitHub();
  renderSidebar();
  if(btn) { btn.disabled=false; btn.textContent='💾 ENREGISTRER'; }
}

// =============================================
// CHARGER / SUPPRIMER
// =============================================
function chargerCours(i) {
  coursActif=i; renderSidebar();
  if(modeActif==='lire') afficherLecture(cours[i]);
  else renderForm(cours[i]);
}

async function supprimerCours() {
  if(!confirm('Supprimer ce cours ?')) return;
  cours.splice(coursActif,1);
  coursActif=null;
  await sauvegarderSurGitHub();
  renderSidebar();
  afficherVide();
}

// =============================================
// UTILITAIRES
// =============================================
function setSyncStatus(type, msg) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = 'sync-status ' + type;
}
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// =============================================
// INIT
// =============================================
chargerDepuisGitHub();
</script>
</body>
</html>
